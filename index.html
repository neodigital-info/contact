      @font-face {
        font-family: "Yekan Bakh";

          url("fonts/woff/YekanBakh-Bold.woff") format("woff");

      }

      @font-face {
        font-family: "Yekan Bakh";

          url("fonts/woff/YekanBakh-ExtraBold.woff") format("woff");

        font-style: normal;
      }

      @font-face {
        font-family: "Yekan Bakh";
        src: url("fonts/woff2/YekanBakh-Black.woff2") format("woff2"),
          url("fonts/woff/YekanBakh-Black.woff") format("woff");
        font-weight: 900;
        font-style: normal;
      }

      @font-face {
        font-family: "Yekan Bakh";
        src: url("fonts/woff2/YekanBakh-ExtraBlack.woff2") format("woff2"),
          url("fonts/woff/YekanBakh-ExtraBlack.woff") format("woff");

        font-style: normal;

      /* ===================================================================
         پالت رنگی جدید — برگرفته از لوگوی Neo Digital (سرمه‌ای + خاکستری روشن)
         =================================================================== */
      :root {
        --navy: #11114f;        /* رنگ پایه برند، برگرفته از خط‌های لوگو */
        --navy-dark: #0a0a32;   /* تیره‌تر، برای حالت hover/active */
        --navy-light: #4d4d86;  /* روشن‌تر، برای متن ثانویه */
        --navy-soft: #e9e9f1;   /* تینت ملایم سرمه‌ای، برای پس‌زمینه‌های نرم */
        --navy-border: #d3d3e3;/* بردر ملایم */
        --text: #1c1c2e;        /* متن اصلی */
        --background: #ececea; /* پس‌زمینه صفحه، هم‌خانواده با پس‌زمینه لوگو */
        --card: #ffffff;        /* پس‌زمینه کارت (fallback بدون blur) */

        /* --- متریال شیشه‌ی مایع (Liquid Glass) --- */
        --glass-fill: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.62),
          rgba(255, 255, 255, 0.28)
        );
        --glass-border: rgba(255, 255, 255, 0.55);
        --glass-shadow: 0 12px 40px rgba(17, 17, 79, 0.18);
        --glass-shine-top: inset 0 1px 1px rgba(255, 255, 255, 0.95);
        --glass-shine-bottom: inset 0 -10px 20px rgba(17, 17, 79, 0.05);
        --blur: blur(22px) saturate(180%);

        /* رنگ‌های ابرهای پس‌زمینه که از پشت شیشه دیده می‌شوند */
        --orb-1: #3b3fa1; /* بنفش-سرمه‌ای */
        --orb-2: #5fb8e8; /* آبی یخی */
        --orb-3: #8d6fd1; /* بنفش روشن */
        --orb-4: #3fb6a8; /* فیروزه‌ای ملایم */
      }

      /* Reset Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Yekan Bakh", Tahoma, sans-serif;
      }

      /* Background & Global Styles */
      html {
        background: var(--background);
      }

      body {
        font-family: "Yekan Bakh", Tahoma, sans-serif;
        font-weight: 400;
        background: transparent;
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
        padding: 0.6rem;
        overflow-x: hidden;
      }

      /* ابرهای رنگی شناور پس‌زمینه — بستری برای جلوه‌ی شیشه‌ی مایع */
      .bg-orbs {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }

      .bg-orbs span {
        position: absolute;
        display: block;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.55;
        will-change: transform;
      }

      .orb-1 {
        width: 46vmax;
        height: 46vmax;
        top: -18vmax;
        right: -14vmax;
        background: radial-gradient(circle, var(--orb-1), transparent 70%);
        animation: drift1 26s ease-in-out infinite;
      }
      .orb-2 {
        width: 38vmax;
        height: 38vmax;
        bottom: -16vmax;
        left: -12vmax;
        background: radial-gradient(circle, var(--orb-2), transparent 70%);
        animation: drift2 32s ease-in-out infinite;
      }
      .orb-3 {
        width: 30vmax;
        height: 30vmax;
        top: 28vh;
        left: 50%;
        background: radial-gradient(circle, var(--orb-3), transparent 70%);
        animation: drift3 22s ease-in-out infinite;
      }
      .orb-4 {
        width: 26vmax;
        height: 26vmax;
        bottom: 8vh;
        right: -6vmax;
        background: radial-gradient(circle, var(--orb-4), transparent 70%);
        animation: drift1 30s ease-in-out infinite reverse;
      }

      @keyframes drift1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-6%, 5%) scale(1.08); }
      }
      @keyframes drift2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(5%, -6%) scale(1.1); }
      }
      @keyframes drift3 {
        0%, 100% { transform: translate(-50%, 0) scale(1); }
        50% { transform: translate(-46%, 4%) scale(0.95); }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-orbs span { animation: none; }
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
        padding: 0 0.6rem; /* جلوگیری از چسبیدن به لبه در موبایل */
      }

      /* ===================================================================
         پروفایل شرکت
         =================================================================== */
      .profile {
        position: relative;
        margin: 2rem 0;
        padding: 2rem 1.5rem 1.7rem;
        background: var(--glass-fill);
        -webkit-backdrop-filter: var(--blur);
        backdrop-filter: var(--blur);
        border-radius: 28px;
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow), var(--glass-shine-top), var(--glass-shine-bottom);
        overflow: hidden;
      }

      /* خط درخشش روی لبه‌ی شیشه — حس برخورد نور با سطح منحنی */
      .profile::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0.65) 0%,
          rgba(255, 255, 255, 0.12) 28%,
          rgba(255, 255, 255, 0) 45%
        );
        pointer-events: none;
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .profile {
          background: rgba(255, 255, 255, 0.92);
        }
      }

      /* -------------------------------------------------------------------
         نشان Neo Digital — قاب براکت + حرف N + نام برند
         ------------------------------------------------------------------- */
      .brand-mark {
        direction: ltr;
        width: 100%;
        max-width: 320px;
        margin: 0 auto 1.1rem;
      }

      .logo-frame-wrap {
        position: relative;
        width: 38%;
        max-width: 130px;
        min-width: 96px;
        aspect-ratio: 1 / 1;
        margin: 0 auto;
      }

      .logo-frame-wrap svg {
        width: 100%;
        height: 100%;
        display: block;
        filter: drop-shadow(0 3px 8px rgba(17, 17, 79, 0.25));
      }

      .brand-word {
        margin-top: 0.9rem;
        font-family: Georgia, "Times New Roman", "Noto Serif", serif;
        font-weight: 700;
        font-size: 1.35rem;
        letter-spacing: 0.18em;
        white-space: nowrap;
        color: var(--navy);
      }

      .brand-tagline {
        margin-top: 0.35rem;
        font-family: Tahoma, Arial, sans-serif;
        font-size: 0.62rem;
        font-weight: 400;
        letter-spacing: 0.26em;
        white-space: nowrap;
        color: var(--navy-light);
      }

      .profile h1 {
        margin-top: 1.3rem;
        color: var(--navy);
        font-size: 1.5rem;
        margin-bottom: 0.4rem;
        font-weight: 800;
      }

      .profile p {
        color: var(--navy-light);
        font-size: 0.95rem;
        max-width: 85%;
        margin: 0 auto;
      }

      .links {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    margin-top: 2rem;
}

      .link-btn {
        display: flex;
        flex-direction: column;
align-items: center;
justify-content: center;
gap: 0.6rem;
text-align: center;

        position: relative;
        background: var(--glass-fill);
        -webkit-backdrop-filter: var(--blur);
        backdrop-filter: var(--blur);
        color: var(--navy);
        padding: 1.2rem;
        border-radius: 24px;
        text-decoration: none;
        min-height: 90px;
        border: 1px solid var(--glass-border);
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        
        
        
        gap: 0.9rem;
        font-weight: 600;
        box-shadow: 0 6px 18px rgba(17, 17, 79, 0.10), var(--glass-shine-top);
        overflow: hidden;
      }

      .link-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0.55) 0%,
          rgba(255, 255, 255, 0.08) 30%,
          rgba(255, 255, 255, 0) 48%
        );
        pointer-events: none;
      }

      .icon-badge {
        position: relative;
        flex-shrink: 0;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(17, 17, 79, 0.7);
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.35);
        box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.55),
          inset 0 -3px 6px rgba(0, 0, 0, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.25s ease, transform 0.25s ease;
      }

      .icon {
        width: 24px;
        height: 24px;
        filter: brightness(0) invert(1);
        position: relative;
        z-index: 1;
      }

      .link-btn:hover,
      .link-btn:focus-visible {
        transform: translateY(-3px);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.78),
          rgba(255, 255, 255, 0.38)
        );
        box-shadow: 0 14px 28px rgba(17, 17, 79, 0.18), var(--glass-shine-top);
      }

      .link-btn:active {
        transform: translateY(-1px) scale(0.985);
      }

      .link-btn:hover .icon-badge {
        background: rgba(10, 10, 50, 0.85);
        transform: scale(1.06);
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .link-btn {
          background: rgba(255, 255, 255, 0.9);
        }
      }

      .bio-placeholder {
        position: relative;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.45),
          rgba(233, 233, 241, 0.35)
        );
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        backdrop-filter: blur(14px) saturate(160%);
        border-radius: 18px;
        padding: 1.5rem;
        margin: 1.6rem 0 0;
        color: var(--text);
        font-size: 0.95rem;
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shine-top);
      }

      .bio-placeholder strong {
        color: var(--navy);
      }

      @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
        .bio-placeholder {
          background: rgba(236, 236, 242, 0.92);
        }
      }

      @media (max-width: 500px) {
    .links {
        grid-template-columns: 1fr;
    }
}
